<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manzar Jewellery</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
}

.logo img{
height:60px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:#333;
font-weight:bold;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
background:url("images/hero.jpg");
background-size:cover;
color:white;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
}

/* PRODUCTS */

.products{
padding:60px 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.product{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
border-radius:8px;
}

.product h3{
margin:10px 0;
}

/* BUTTON */

.btn{
background:#243a57;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="images/logo.png" alt="Manzar Logo">

</div>

<nav>

<a href="#">Home</a>
<a href="#">Collection</a>
<a href="#">Contact</a>

</nav>

</header>


<section class="hero">

<h1>MANZAR Jewellery</h1>

<p>Exquisite Craftsmanship & Trust</p>

</section>


<section class="products">

<div class="product">

<img src="images/ring.jpg">

<h3>Silver Ring</h3>

<p>₹2999</p>

<button class="btn">Add to Cart</button>

</div>


<div class="product">

<img src="images/necklace.jpg">

<h3>Gold Necklace</h3>

<p>₹5999</p>

<button class="btn">Add to Cart</button>

</div>


<div class="product">

<img src="images/earrings.jpg">

<h3>Diamond Earrings</h3>

<p>₹3999</p>

<button class="btn">Add to Cart</button>

</div>

</section>


<a class="whatsApp" href="https://wa.me/919148891572">
💬
</a>

</body>

</html>
